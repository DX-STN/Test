<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #fff; overflow-x: hidden; }

        /* 右上エリア */
        .header { width: 100%; max-width: 350px; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .file-controls { display: flex; flex-direction: column; gap: 4px; width: 150px; }
        .info-field { border: 1px solid #333; padding: 3px; font-size: 11px; min-height: 22px; background: #fdfdfd; }
        .btn-select { background: #eee; border: 1px solid #333; padding: 4px; cursor: pointer; font-size: 11px; border-radius: 2px; }

        /* メインレイアウト（Gridを使用） */
        .editor-grid {
            display: grid;
            grid-template-columns: 300px 40px; /* キャンバス | 縦スライダー */
            grid-template-rows: 300px 40px;    /* キャンバス | 横スライダー */
            width: 340px;
        }

        #canvas-wrapper { 
            grid-column: 1; grid-row: 1;
            position: relative; border: 1px solid #333; background: #eee; overflow: hidden; 
        }
        canvas { width: 100%; height: 100%; display: block; object-fit: contain; }
        #selection-box { position: absolute; border: 1px solid #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); pointer-events: none; }

        /* スライダー共通 */
        .slider-box { position: relative; touch-action: none; }
        input[type="range"] { position: absolute; appearance: none; -webkit-appearance: none; background: none; pointer-events: none; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { width: 22px; height: 18px; cursor: pointer; pointer-events: auto; appearance: none; -webkit-appearance: none; border: 1px solid #333; }

        /* 縦スライダー（右側） */
        .ver-box { grid-column: 2; grid-row: 1; }
        .v-track { position: absolute; height: 100%; width: 4px; background: #333; left: 50%; transform: translateX(-50%); }
        .v-input { width: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); }
        #v-low::-webkit-slider-thumb { background: #007bff; border-radius: 10px 10px 0 0; transform: translateY(-14px); }
        #v-upp::-webkit-slider-thumb { background: #dc3545; border-radius: 0 0 10px 10px; transform: translateY(14px); }

        /* 横スライダー（下側） */
        .hor-box { grid-column: 1; grid-row: 2; }
        .h-track { position: absolute; width: 100%; height: 4px; background: #333; top: 50%; transform: translateY(-50%); }
        .h-input { width: 100%; top: 50%; left: 0; transform: translateY(-50%); }
        #h-low::-webkit-slider-thumb { background: #007bff; border-radius: 10px 10px 0 0; transform: translateY(-14px); }
        #h-upp::-webkit-slider-thumb { background: #dc3545; border-radius: 0 0 10px 10px; transform: translateY(14px); }

        /* 数値入力（1行） */
        .values-row { margin-top: 10px; display: flex; gap: 4px; font-size: 13px; align-items: center; }
        .values-row input { width: 45px; text-align: center; border: 1px solid #333; padding: 2px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="file-controls">
            <div class="info-field" id="fn">画像未選択</div>
            <div class="info-field" id="fs">0 x 0 px</div>
            <button class="btn-select" onclick="document.getElementById('img-in').click()">ファイル選択</button>
            <input type="file" id="img-in" accept="image/*" style="display:none">
        </div>
    </div>

    <div class="editor-grid">
        <div id="canvas-wrapper">
            <canvas id="cv"></canvas>
            <div id="selection-box"></div>
        </div>
        <div class="slider-box ver-box">
            <div class="v-track"></div>
            <input type="range" id="v-low" class="v-input" min="1" max="550" value="50">
            <input type="range" id="v-upp" class="v-input" min="1" max="550" value="500">
        </div>
        <div class="slider-box hor-box">
            <div class="h-track"></div>
            <input type="range" id="h-low" class="h-input" min="1" max="550" value="50">
            <input type="range" id="h-upp" class="h-input" min="1" max="550" value="500">
        </div>
    </div>

    <div class="values-row">
        横:<input type="number" id="in-hl">〜<input type="number" id="in-hu">
        縦:<input type="number" id="in-vl">〜<input type="number" id="in-vu">
    </div>

<script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const box = document.getElementById('selection-box');
    const imgIn = document.getElementById('img-in');

    const el = {
        hl: document.getElementById('h-low'), hu: document.getElementById('h-upp'),
        vl: document.getElementById('v-low'), vu: document.getElementById('v-upp'),
        ihl: document.getElementById('in-hl'), ihu: document.getElementById('in-hu'),
        ivl: document.getElementById('in-vl'), ivu: document.getElementById('in-vu')
    };

    imgIn.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('fn').textContent = file.name;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                document.getElementById('fs').textContent = `${img.width} x ${img.height} px`;
                cv.width = 550; cv.height = 550;
                const r = Math.min(550 / img.width, 550 / img.height);
                ctx.clearRect(0,0,550,550);
                ctx.drawImage(img, (550-img.width*r)/2, (550-img.height*r)/2, img.width*r, img.height*r);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        this.value = '';
    };

    function sync(e) {
        // 数値入力中の空欄（消去中）は無視
        if (e && e.target.type === 'number' && e.target.value === "") return;

        // 数値入力からスライダーへの値の流し込み
        if (e && e.target.type === 'number') {
            el.hl.value = el.ihl.value; el.hu.value = el.ihu.value;
            el.vl.value = el.ivl.value; el.vu.value = el.ivu.value;
        }

        let hl = parseInt(el.hl.value), hu = parseInt(el.hu.value);
        let vl = parseInt(el.vl.value), vu = parseInt(el.vu.value);

        // 追い越し防止
        if (hl > hu) { if(e.target === el.hl || e.target === el.ihl) el.hl.value = hu; else el.hu.value = hl; }
        if (vl > vu) { if(e.target === el.vl || e.target === el.ivl) el.vl.value = vu; else el.vu.value = vl; }

        // 入力欄を更新
        el.ihl.value = el.hl.value; el.ihu.value = el.hu.value;
        el.ivl.value = el.vl.value; el.ivu.value = el.vu.value;

        // 枠の表示更新
        const ratio = 100 / 550;
        box.style.left = (el.hl.value - 1) * ratio + "%";
        box.style.top = (el.vl.value - 1) * ratio + "%";
        box.style.width = (el.hu.value - el.hl.value) * ratio + "%";
        box.style.height = (el.vu.value - el.vl.value) * ratio + "%";
    }

    // スライダーは動かした瞬間に同期
    [el.hl, el.hu, el.vl, el.vu].forEach(i => i.oninput = sync);
    // 数値入力は確定時(change)とEnter時に同期
    [el.ihl, el.ihu, el.ivl, el.ivu].forEach(i => {
        i.onchange = sync;
        i.onkeydown = (e) => { if(e.key === 'Enter') { sync(e); e.target.blur(); } };
    });

    sync({target: el.hl});
</script>
</body>
</html>
